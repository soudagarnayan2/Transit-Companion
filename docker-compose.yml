# Docker Compose — Trassit Companion Local Development
# Provisions PostgreSQL (with PostGIS) and Redis.
#
# Usage:
#   docker-compose up -d
#   docker-compose down

version: "3.9"

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: trassit_postgres
    restart: unless-stopped
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PGUSER:-trassit}
      POSTGRES_PASSWORD: ${PGPASSWORD:-trassit_dev}
      POSTGRES_DB: ${PGDATABASE:-trassit_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-trassit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trassit_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
