name: Phase 0 Sourcing Scheduler

on:
  schedule:
    # 05:00 AM IST is 23:30 UTC of previous day (or same day depending on zone, 23:30 + 5:30 = 05:00 AM next day)
    - cron: '30 23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  source-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sourcing Orchestrator
        run: npm run phase0
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
          TRANSITLAND_API_KEY: ${{ secrets.TRANSITLAND_API_KEY }}
          MAPMYINDIA_CLIENT_ID: ${{ secrets.MAPMYINDIA_CLIENT_ID }}
          MAPMYINDIA_CLIENT_SECRET: ${{ secrets.MAPMYINDIA_CLIENT_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          CHALO_API_BASE_URL: ${{ secrets.CHALO_API_BASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
